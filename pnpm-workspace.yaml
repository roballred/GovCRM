packages:
  - 'apps/*'
allowBuilds:
  esbuild: true
  sharp: true
# @govcore/* are our own first-party packages (we publish them); exempt the whole
# scope from the minimum-release-age supply-chain gate so a fresh GovCore release
# can be adopted immediately. The gate still protects all third-party deps.
minimumReleaseAgeExclude:
  - '@govcore/*'
